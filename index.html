<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fact Flow</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🌍 Fact Flow</h1>
    <p>Discover Amazing Facts Every Day</p>

    <button onclick="toggleDarkMode()">
        🌙 Dark Mode
    </button>
</header>

<nav>
    <ul>
        <li><a href="#" onclick="showCategory('general')">Home</a></li>
        <li><a href="#" onclick="showCategory('science')">Science</a></li>
        <li><a href="#" onclick="showCategory('history')">History</a></li>
        <li><a href="#" onclick="showCategory('animals')">Animals</a></li>
        <li><a href="#" onclick="showCategory('space')">Space</a></li>
        <li><a href="#" onclick="showCategory('technology')">Technology</a></li>
    </ul>
</nav>

<section class="hero">

    <h2>Welcome to Fact Flow</h2>

    <p>
        Explore amazing facts from different categories.
    </p>

    <input
        type="text"
        id="search"
        placeholder="Search facts..."
    >

    <button onclick="nextFact()">Next Fact</button>
<button onclick="randomFact()">🎲 Random Fact</button>
<button onclick="shareFact()">📤 Share Fact</button>
    
</section>

<section class="fact-box">

    <h2>Today's Fact</h2>

    <p id="fact">
        Honey never spoils.
    </p>

    <button onclick="nextFact()">
        Next Fact
    </button>

</section>

<footer>

    <p>
        © 2026 Fact Flow | All Rights Reserved
    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
